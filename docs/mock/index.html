<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mochi UI — Mock (Button / Card / Input)</title>
  <style>
    :root {
      --mochi-color-primary: #6cb4ee;
      --mochi-color-primary-dark: #4a9ad4;
      --mochi-color-bg: #fff8f0;
      --mochi-color-surface: #ffffff;
      --mochi-color-surface-muted: #fff3e8;
      --mochi-color-text: #5c4a3a;
      --mochi-color-text-disabled: #c4b5a8;
      --mochi-color-border: #e8d5c4;
      --mochi-color-pink: #f8b4c4;
      --mochi-color-mint: #a8e6cf;
      --mochi-radius-pill: 999px;
      --mochi-radius-md: 20px;
      --mochi-border-width: 2px;
      --mochi-shadow-md: 0 4px 0 #e8d5c4;
      --mochi-shadow-primary: 0 4px 0 #4a9ad4;
      --mochi-shadow-pressed: 0 1px 0 #e8d5c4;
      --mochi-font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--mochi-font-family);
      background: var(--mochi-color-bg);
      color: var(--mochi-color-text);
      padding: 32px 24px 64px;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(108,180,238,0.12) 0%, transparent 40%),
        radial-gradient(circle at 88% 12%, rgba(248,180,196,0.14) 0%, transparent 35%),
        radial-gradient(circle at 70% 80%, rgba(168,230,207,0.12) 0%, transparent 40%);
      min-height: 100vh;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    .subtitle { color: #8b7355; margin: 0 0 32px; font-size: 15px; }
    section { margin-bottom: 40px; }
    h2 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2::before {
      content: '';
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--mochi-color-primary);
      box-shadow: 0 2px 0 var(--mochi-color-primary-dark);
    }
    .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
    .label {
      font-size: 12px;
      font-weight: 600;
      color: #8b7355;
      width: 100%;
      margin-bottom: -8px;
    }
    /* Button */
    .mochi-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: var(--mochi-border-width) solid transparent;
      border-radius: var(--mochi-radius-pill);
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 22px;
      cursor: pointer;
      transition: transform 150ms cubic-bezier(0.34,1.4,0.64,1), box-shadow 150ms ease;
      user-select: none;
    }
    .mochi-btn--primary {
      background: linear-gradient(180deg, #8fc8f2 0%, var(--mochi-color-primary) 100%);
      color: #fff;
      border-color: var(--mochi-color-primary-dark);
      box-shadow: var(--mochi-shadow-primary);
    }
    .mochi-btn--primary:active,
    .mochi-btn.is-pressed {
      transform: translateY(3px);
      box-shadow: 0 1px 0 var(--mochi-color-primary-dark);
    }
    .mochi-btn--default {
      background: var(--mochi-color-surface);
      color: var(--mochi-color-text);
      border-color: var(--mochi-color-border);
      box-shadow: var(--mochi-shadow-md);
    }
    .mochi-btn--default:active { transform: translateY(3px); box-shadow: var(--mochi-shadow-pressed); }
    .mochi-btn--dashed {
      background: var(--mochi-color-surface-muted);
      border-style: dashed;
      border-color: var(--mochi-color-border);
      color: var(--mochi-color-text);
      box-shadow: var(--mochi-shadow-md);
    }
    .mochi-btn--text {
      background: transparent;
      color: var(--mochi-color-primary-dark);
      box-shadow: none;
      border-color: transparent;
    }
    .mochi-btn.is-disabled {
      opacity: 0.55;
      cursor: not-allowed;
      pointer-events: none;
      color: var(--mochi-color-text-disabled);
      box-shadow: none;
    }
    .mochi-btn.is-loading { position: relative; color: transparent !important; }
    .mochi-btn.is-loading::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: inherit;
      background: repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.35) 0 8px,
        rgba(255,255,255,0.1) 8px 16px
      );
      background-size: 22px 22px;
      animation: stripe 0.6s linear infinite;
    }
    @keyframes stripe { to { background-position: 22px 0; } }
    /* Card */
    .mochi-card {
      background: var(--mochi-color-surface);
      border: var(--mochi-border-width) solid var(--mochi-color-border);
      border-radius: var(--mochi-radius-md);
      box-shadow: var(--mochi-shadow-md);
      padding: 20px;
      width: 220px;
      min-height: 120px;
    }
    .mochi-card--dashed { border-style: dashed; }
    .mochi-card--pink { background: #fff0f4; border-color: var(--mochi-color-pink); }
    .mochi-card--mint { background: #f0faf6; border-color: var(--mochi-color-mint); }
    .mochi-card h3 { margin: 0 0 8px; font-size: 16px; font-weight: 700; }
    .mochi-card p { margin: 0; font-size: 13px; color: #8b7355; line-height: 1.5; }
    /* Input */
    .mochi-input-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--mochi-color-surface);
      border: var(--mochi-border-width) solid var(--mochi-color-border);
      border-radius: var(--mochi-radius-pill);
      box-shadow: var(--mochi-shadow-md);
      padding: 8px 16px;
      min-width: 240px;
      transition: box-shadow 150ms ease, transform 150ms ease;
    }
    .mochi-input-wrap:focus-within {
      border-color: var(--mochi-color-primary);
      box-shadow: 0 4px 0 var(--mochi-color-primary-light, #a8d4f5);
    }
    .mochi-input-wrap input {
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      font-size: 14px;
      color: var(--mochi-color-text);
      width: 100%;
    }
    .mochi-input-wrap input::placeholder { color: var(--mochi-color-text-disabled); }
    .mochi-input-wrap.is-disabled {
      background: var(--mochi-color-surface-muted);
      box-shadow: none;
      opacity: 0.7;
    }
    .mochi-input-wrap.is-error {
      border-color: #f08080;
      box-shadow: 0 4px 0 #d06060;
    }
    .prefix { font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <h1>Mochi UI · Mock</h1>
  <p class="subtitle">Button / Card / Input 三态静态预览 — Sky blue & soft</p>

  <section>
    <h2>Button</h2>
    <div class="row">
      <span class="label">默认 / 变体</span>
      <button class="mochi-btn mochi-btn--primary">Primary</button>
      <button class="mochi-btn mochi-btn--default">Default</button>
      <button class="mochi-btn mochi-btn--dashed">Dashed</button>
      <button class="mochi-btn mochi-btn--text">Text</button>
    </div>
    <div class="row" style="margin-top:16px">
      <span class="label">按压 / 禁用 / 加载</span>
      <button class="mochi-btn mochi-btn--primary is-pressed">Pressed</button>
      <button class="mochi-btn mochi-btn--default is-disabled">Disabled</button>
      <button class="mochi-btn mochi-btn--primary is-loading">Loading</button>
    </div>
  </section>

  <section>
    <h2>Card</h2>
    <div class="row">
      <div class="mochi-card">
        <h3>Default</h3>
        <p>贴纸式圆角卡片，底部色块阴影。</p>
      </div>
      <div class="mochi-card mochi-card--dashed">
        <h3>Dashed</h3>
        <p>虚线边框变体，适合草稿区。</p>
      </div>
      <div class="mochi-card mochi-card--pink">
        <h3>Pink</h3>
        <p>樱花粉表面，柔和可爱。</p>
      </div>
      <div class="mochi-card mochi-card--mint">
        <h3>Mint</h3>
        <p>薄荷绿表面，清新软糯。</p>
      </div>
    </div>
  </section>

  <section>
    <h2>Input</h2>
    <div class="row">
      <span class="label">默认 / 聚焦感 / 错误 / 禁用</span>
      <div class="mochi-input-wrap">
        <span class="prefix">☁</span>
        <input placeholder="请输入昵称" />
      </div>
      <div class="mochi-input-wrap" style="border-color:#6cb4ee;box-shadow:0 4px 0 #a8d4f5">
        <input value="聚焦态示例" />
      </div>
      <div class="mochi-input-wrap is-error">
        <input value="格式有误" />
      </div>
      <div class="mochi-input-wrap is-disabled">
        <input disabled value="已禁用" />
      </div>
    </div>
  </section>
</body>
</html>
